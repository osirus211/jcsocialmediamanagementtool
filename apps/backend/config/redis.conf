# Redis Configuration for Production Durability
# 
# This configuration ensures Redis is safe for queue persistence
# and can recover from crashes without data loss

###############################################################################
# PERSISTENCE - AOF (Append Only File)
###############################################################################

# Enable AOF persistence for durability
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# Fsync policy: everysec (good balance of performance and durability)
# - always: Fsync after every write (slowest, most durable)
# - everysec: Fsync every second (recommended)
# - no: Never fsync, let OS decide (fastest, least durable)
appendfsync everysec

# Don't fsync during rewrite to avoid blocking
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows by 100% and is at least 64MB
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup
aof-load-truncated yes

# Use RDB-AOF hybrid format for faster restarts
aof-use-rdb-preamble yes

###############################################################################
# PERSISTENCE - RDB (Snapshot)
###############################################################################

# Save snapshots for additional safety
# Format: save <seconds> <changes>
save 900 1      # After 900 sec (15 min) if at least 1 key changed
save 300 10     # After 300 sec (5 min) if at least 10 keys changed
save 60 10000   # After 60 sec if at least 10000 keys changed

# RDB filename
dbfilename dump.rdb

# Directory for both RDB and AOF files
dir /data

# Compress RDB files
rdbcompression yes

# Checksum RDB files
rdbchecksum yes

# Stop writes if RDB save fails (safety)
stop-writes-on-bgsave-error yes

###############################################################################
# MEMORY MANAGEMENT
###############################################################################

# CRITICAL: Disable eviction to prevent queue job loss
# noeviction: Return error when memory limit is reached
# This prevents Redis from evicting queue jobs
maxmemory-policy noeviction

# Set max memory (adjust based on your server)
# Example: 2GB
maxmemory 2gb

###############################################################################
# REPLICATION (if using replica)
###############################################################################

# Replica serves stale data if master is down
replica-serve-stale-data yes

# Replica is read-only
replica-read-only yes

# Use diskless replication for better performance
repl-diskless-sync yes
repl-diskless-sync-delay 5

###############################################################################
# SECURITY
###############################################################################

# Require password (set via environment variable)
# requirepass your_redis_password

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

###############################################################################
# PERFORMANCE
###############################################################################

# TCP backlog
tcp-backlog 511

# TCP keepalive
tcp-keepalive 300

# Timeout for idle clients (0 = disabled)
timeout 0

# Max clients
maxclients 10000

# Lazy freeing
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Disable slow log for production
slowlog-log-slower-than 10000
slowlog-max-len 128

###############################################################################
# LOGGING
###############################################################################

# Log level: debug, verbose, notice, warning
loglevel notice

# Log file
logfile "/var/log/redis/redis-server.log"

###############################################################################
# ADVANCED
###############################################################################

# Hash max ziplist entries
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List max ziplist size
list-max-ziplist-size -2

# Set max intset entries
set-max-intset-entries 512

# Sorted set max ziplist entries
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog sparse representation
hll-sparse-max-bytes 3000

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing
hz 10

# Enable active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 5
active-defrag-cycle-max 75

###############################################################################
# NOTES
###############################################################################

# This configuration prioritizes durability for queue persistence:
#
# 1. AOF with everysec fsync ensures minimal data loss (max 1 second)
# 2. RDB snapshots provide additional recovery points
# 3. noeviction prevents queue job loss due to memory pressure
# 4. Dangerous commands disabled for security
# 5. Optimized for BullMQ queue operations
#
# For production:
# - Monitor memory usage and adjust maxmemory
# - Set requirepass for security
# - Consider Redis Sentinel or Cluster for HA
# - Monitor AOF and RDB file sizes
# - Test recovery procedures regularly
