# Blue-Green Deployment Nginx Configuration
# This configuration routes traffic to the active slot (blue or green)

# Backend upstream - points to active slot
upstream backend_active {
    server localhost:3001; # Default to blue slot (port 3001)
    # This will be dynamically updated by switch-slot.sh script
    # Blue slot: localhost:3001
    # Green slot: localhost:3002
}

# Frontend upstream - points to active slot
upstream frontend_active {
    server localhost:4001; # Default to blue slot (port 4001)
    # This will be dynamically updated by switch-slot.sh script
    # Blue slot: localhost:4001
    # Green slot: localhost:4002
}

# Health check upstreams for both slots
upstream backend_blue {
    server localhost:3001;
}

upstream backend_green {
    server localhost:3002;
}

upstream frontend_blue {
    server localhost:4001;
}

upstream frontend_green {
    server localhost:4002;
}

# Main server block - production traffic
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API routes - proxy to backend
    location /api/ {
        proxy_pass http://backend_active;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Frontend routes - proxy to frontend
    location / {
        proxy_pass http://frontend_active;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Nginx health check endpoint
    location /nginx-health {
        access_log off;
        return 200 'nginx-ok';
        add_header Content-Type text/plain;
    }

    # Load balancer health check endpoint
    location /lb-health {
        access_log off;
        proxy_pass http://backend_active/api/v1/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
}

# Blue slot health check server (port 8001)
server {
    listen 8001;
    server_name _;

    location /api/v1/health {
        proxy_pass http://backend_blue/api/v1/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location / {
        proxy_pass http://frontend_blue;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /health {
        return 200 'blue-slot-ok';
        add_header Content-Type text/plain;
    }
}

# Green slot health check server (port 8002)
server {
    listen 8002;
    server_name _;

    location /api/v1/health {
        proxy_pass http://backend_green/api/v1/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location / {
        proxy_pass http://frontend_green;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /health {
        return 200 'green-slot-ok';
        add_header Content-Type text/plain;
    }
}

# Logging configuration
log_format blue_green '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'upstream: $upstream_addr '
                     'response_time: $upstream_response_time';

access_log /var/log/nginx/blue_green_access.log blue_green;
error_log /var/log/nginx/blue_green_error.log warn;